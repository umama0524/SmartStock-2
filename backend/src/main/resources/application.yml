spring:
  application:
    name: smartstock-backend

  # デフォルトはH2（開発用）
  profiles:
    active: dev

  # CORS設定
  web:
    cors:
      allowed-origins: http://localhost:5173
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: "*"
      allow-credentials: true

# JWT設定
jwt:
  secret: SmartStock2025SecretKeyForJWTTokenGenerationMustBe256BitsLong!
  expiration: 86400000  # 24時間（ミリ秒）

# サーバー設定
server:
  port: 8080

---
# 開発環境（H2 Database）
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:h2:mem:smartstock;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true

---
# 本番環境（MySQL）
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://localhost:3306/smartstock?useSSL=false&serverTimezone=Asia/Tokyo&allowPublicKeyRetrieval=true
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: smartstock_user
    password: your_password_here

  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: false
